<!DOCTYPE html>
<html>
<head>

<title>Edit Candidate</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family: Arial;
background:#e9f0fb;
margin:0;
}

.header{
background:#0d6efd;
color:white;
padding:12px 25px;
position:fixed;
top:0;
width:100%;
}

.sidebar{
width:220px;
height:100vh;
position:fixed;
background:#6c757d;
padding-top:80px;
}

.sidebar a{
color:white;
padding:10px 20px;
display:block;
text-decoration:none;
}

.sidebar a:hover{
background:#0d6efd;
}

.main{
margin-left:240px;
padding:100px 25px;
}

.card{
background:white;
padding:25px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="header">
<h3>Recruitment Hub</h3>
</div>

<div class="sidebar">

<h4 class="text-center">Candidates</h4>

<a href="/candidates_add">Add Candidate</a>
<a href="/candidates_view">View Candidates</a>

</div>

<div class="main">

<h2>Edit Candidate</h2>

<div class="card">

<form method="POST" action="/candidates_update/{{candidate.id}}">

<div class="row g-3">

<div class="col-md-6">
<label>Name</label>
<input type="text" name="name" value="{{candidate.name}}" class="form-control">
</div>

<div class="col-md-6">
<label>Email</label>
<input type="email" name="email" value="{{candidate.email}}" class="form-control">
</div>

<div class="col-md-6">
<label>Phone</label>
<input type="text" name="phone" value="{{candidate.phone}}" class="form-control">
</div>

<div class="col-md-6">
<label>Skills</label>
<input type="text" name="skills" value="{{candidate.skills}}" class="form-control">
</div>

<div class="col-md-6">
<label>Experience</label>
<input type="number" name="experience" value="{{candidate.experience}}" class="form-control">
</div>

<div class="col-md-6">
<label>Location</label>
<input type="text" name="location" value="{{candidate.location}}" class="form-control">
</div>

<div class="col-md-6">
<label>Recruiter</label>
<input type="text" name="recruiter" value="{{candidate.recruiter}}" class="form-control">
</div>

</div>

<br>

<button class="btn btn-primary">Update Candidate</button>

<a href="/candidates_view" class="btn btn-secondary">Cancel</a>

</form>

</div>

</div>

</body>
</html>
