<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recruitment Hub</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family: Arial;
background:#f5f7fa;
margin:0;
}

.header{
background:#0d6efd;
color:white;
padding:12px 25px;
display:flex;
justify-content:space-between;
align-items:center;
position:fixed;
top:0;
width:100%;
z-index:1000;
}

.header a{
color:white;
text-decoration:none;
margin-left:15px;
}

.sidebar{
width:220px;
height:100vh;
position:fixed;
background:#6c757d;
padding-top:80px;
color:white;
}

.sidebar a{
color:white;
padding:10px 20px;
display:block;
text-decoration:none;
}

.sidebar a:hover{
background:#0d6efd;
}

.main{
margin-left:240px;
padding:100px 25px;
}

</style>

</head>

<body>

<!-- HEADER -->

<div class="header">

<h3>Recruitment Hub</h3>

<div>

<a href="/">Home</a>

<a href="/about">About Us</a>

{% if session.get('user') %}

<span style="margin-left:15px;">👤 {{ session['user'] }}</span>

<a href="/logout">Logout</a>

{% else %}

<a href="/login">Login</a>

{% endif %}

</div>

</div>

<!-- PAGE CONTENT -->

{% block content %}
{% endblock %}

</body>
</html>
